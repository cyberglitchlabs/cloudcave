cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup
ipam:
  mode: kubernetes
k8sServiceHost: localhost
k8sServicePort: 7445
kubeProxyReplacement: true
ingressController:
    enabled: true
hubble:
  relay:
    enabled: true
  ui:
    enabled: true
    ingress:
      enabled: false
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-cloudflare
        external-dns.alpha.kubernetes.io/internal-hostname: hubble.sievert.com
      hosts:
        - hubble.sievert.com
      labels: {}
      tls:
        - secretName: hubble-tls
          hosts:
            - hubble.sievert.com
operator:
  replicas: 1
securityContext:
  capabilities:
    ciliumAgent:
    - CHOWN
    - KILL
    - NET_ADMIN
    - NET_RAW
    - IPC_LOCK
    - SYS_ADMIN
    - SYS_RESOURCE
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    cleanCiliumState:
    - NET_ADMIN
    - SYS_ADMIN
    - SYS_RESOURCE
