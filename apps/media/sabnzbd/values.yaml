controllers:
  sabnzbd:
    strategy: Recreate
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/sabnzbd
          tag: 4.4.1
          pullPolicy: IfNotPresent
        env:
          TZ: "America/Chicago"
          SABNZBD__HOST_WHITELIST_ENTRIES: >-
            sabnzbd,
            sabnzbd.default,
            sabnzbd.default.svc,
            sabnzbd.default.svc.cluster,
            sabnzbd.default.svc.cluster.local,
            sab.sievert.fun,
            sabnzbd.sievert.fun

service:
  app:
    controller: sabnzbd
    ports:
      http:
        port: 8080

ingress:
  app:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare
      external-dns.alpha.kubernetes.io/internal-hostname: sabnzbd.sievert.fun
    hosts:
      - host: sabnzbd.sievert.fun
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: app
              port: http
    tls:
      - secretName: sabnzbd-tls
        hosts:
          - sabnzbd.sievert.fun

podSecurityContext:
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  fsGroupChangePolicy: OnRootMismatch

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: local-path
    size: 1Gi
    globalMounts:
      - path: /config
  media:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: smb-sabnzbd
