controllers:
  lidarr:
    strategy: Recreate
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/lidarr
          tag: 2.10.1.4589
          pullPolicy: IfNotPresent
        env:
          TZ: "America/Chicago"

service:
  app:
    controller: lidarr
    ports:
      http:
        port: 8086

ingress:
  app:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare
      external-dns.alpha.kubernetes.io/internal-hostname: lidarr.sievert.fun
    hosts:
      - host: lidarr.sievert.fun
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: app
              port: http
    tls:
      - secretName: lidarr-tls
        hosts:
          - lidarr.sievert.fun

podSecurityContext:
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  fsGroupChangePolicy: OnRootMismatch

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: local-path
    size: 1Gi
    globalMounts:
      - path: /config
