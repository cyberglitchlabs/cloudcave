controllers:
  sonarr:
    strategy: Recreate
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/sonarr
          tag: 4.0.13.2932-ls274
          pullPolicy: IfNotPresent
        env:
          TZ: "America/Chicago"
          PUID: 1001
          PGID: 1001

service:
  app:
    controller: sonarr
    ports:
      http:
        port: 8089

ingress:
  app:
    className: cilium
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare
      external-dns.alpha.kubernetes.io/internal-hostname: sonarr.sievert.fun
    hosts:
      - host: sonarr.sievert.fun
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: app
              port: http
    tls:
      - secretName: sonarr-tls
        hosts:
          - sonarr.sievert.fun


podSecurityContext:
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  fsGroupChangePolicy: OnRootMismatch

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: khal-drogo-nfs
    size: 1Gi
    globalMounts:
      - path: /config
