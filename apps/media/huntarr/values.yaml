controllers:
  huntarr:
    strategy: Recreate
    containers:
      app:
        image:
          repository: hotio/huntarr
          tag: release
          pullPolicy: IfNotPresent
        env:
          TZ: "America/Chicago"
          SONARR__PORT: 8989
service:
  app:
    controller: huntarr
    ports:
      http:
        port: 9000

ingress:
  app:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare
      external-dns.alpha.kubernetes.io/internal-hostname: huntarr.sievert.fun
    hosts:
    - host: huntarr.sievert.fun
      paths:
      - path: /
        pathType: Prefix
        service:
          identifier: app
          port: http
    tls:
    - secretName: huntarr-tls
      hosts:
      - huntarr.sievert.fun

podSecurityContext:
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  fsGroupChangePolicy: OnRootMismatch

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: local-path
    size: 1Gi
    globalMounts:
    - path: /config
  media:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: smb-huntarr
