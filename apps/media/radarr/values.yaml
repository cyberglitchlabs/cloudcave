controllers:
  radarr:
    strategy: Recreate
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/radarr
          tag: 5.20.2.9777
          pullPolicy: IfNotPresent
        env:
          TZ: "America/Chicago"

service:
  app:
    controller: radarr
    ports:
      http:
        port: 7878

ingress:
  app:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare
      external-dns.alpha.kubernetes.io/internal-hostname: radarr.sievert.fun
    hosts:
      - host: radarr.sievert.fun
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: app
              port: http
    tls:
      - secretName: radarr-tls
        hosts:
          - radarr.sievert.fun

podSecurityContext:
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  fsGroupChangePolicy: OnRootMismatch

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: local-path
    size: 1Gi
    globalMounts:
      - path: /config
  media:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: smb-radarr
