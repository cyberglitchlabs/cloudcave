controllers:
  audiobooks:
    strategy: Recreate
    containers:
      app:
        image:
          repository: ghcr.io/advplyr/audiobookshelf
          tag: 2.20.0
          pullPolicy: IfNotPresent
        env:
          TZ: "America/Chicago"
          AUDIOBOOKSHELF_UID: 1001
          AUDIOBOOKSHELF_GID: 1001
          CONFIG_PATH: /config
          METADATA_PATH: /config/metadata

service:
  app:
    controller: audiobooks
    ports:
      http:
        port: 80

ingress:
  app:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare
      external-dns.alpha.kubernetes.io/internal-hostname: audiobooks.sievert.fun
    hosts:
      - host: audiobooks.sievert.fun
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: app
              port: http
    tls:
      - secretName: audiobooks-tls
        hosts:
          - audiobooks.sievert.fun

podSecurityContext:
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  fsGroupChangePolicy: OnRootMismatch

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: local-path
    size: 1Gi
    globalMounts:
      - path: /config
  media:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: smb-media
