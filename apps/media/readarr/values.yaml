controllers:
  readarr:
    strategy: Recreate
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/readarr
          tag: 0.4.12.2753
          pullPolicy: IfNotPresent
        env:
          TZ: "America/Chicago"

service:
  app:
    controller: readarr
    ports:
      http:
        port: 8787

ingress:
  app:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare
      external-dns.alpha.kubernetes.io/internal-hostname: readarr.sievert.fun
    hosts:
      - host: readarr.sievert.fun
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: app
              port: http
    tls:
      - secretName: readarr-tls
        hosts:
          - readarr.sievert.fun

podSecurityContext:
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  fsGroupChangePolicy: OnRootMismatch

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: local-path
    size: 1Gi
    globalMounts:
      - path: /config
  media:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: smb-readarr
