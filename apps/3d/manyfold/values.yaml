controllers:
  manyfold:
    strategy: Recreate
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/manyfoldstudio
          tag: 02.00.02
          pullPolicy: IfNotPresent
        env:
          TZ: "America/Chicago"
          PUID: 1000
          PGID: 1000
          DARK_MODE: true
          SECRET_KEY_BASE:
            valueFrom:
              secretKeyRef:
                name: manyfold-db-secret
                key: secret-key-base
          DATABASE_ADAPTER: postgresql
          DATABASE_HOST: postgres-server
          DATABASE_PORT: 5432
          DATABASE_NAME: manyfold
          DATABASE_USER: manyfold
          DATABASE_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: manyfold-db-secret
                key: postgres-password
          REDIS_URL: redis://:redis_password@redis-server:6379/1

  redis:
    strategy: Recreate
    containers:
      app:
        image:
          repository: redis
          tag: "7.2"
          pullPolicy: IfNotPresent
        env:
          REDIS_PASSWORD: "redis_password"

  postgres:
    strategy: Recreate
    containers:
      app:
        image:
          repository: postgres
          tag: "16.2"
          pullPolicy: IfNotPresent
        env:
          POSTGRES_USER: "manyfold"
          POSTGRES_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: manyfold-db-secret
                key: postgres-password
          POSTGRES_DB: "manyfold"

service:
  app:
    controller: manyfold
    ports:
      http:
        port: 3000

  redis:
    controller: redis
    ports:
      redis:
        port: 6379

  postgres:
    controller: postgres
    ports:
      postgres:
        port: 5432

ingress:
  app:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare
      external-dns.alpha.kubernetes.io/internal-hostname: manyfold.sievert.fun
    hosts:
      - host: manyfold.sievert.fun
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: app
              port: http
    tls:
      - secretName: manyfold-tls
        hosts:
          - manyfold.sievert.fun

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: khal-drogo-nfs
    size: 1Gi
    globalMounts:
      - path: /config

  redis:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: khal-drogo-nfs
    size: 1Gi

  postgres:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: khal-drogo-nfs
    size: 1Gi
