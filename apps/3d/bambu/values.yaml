controllers:
  bambu:
    strategy: Recreate
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/bambustudio
          tag: 2.0.3
          pullPolicy: IfNotPresent
        env:
          TZ: "America/Chicago"
          PUID: 1000
          PGID: 1000
          DARK_MODE: true

service:
  app:
    controller: bambu
    ports:
      http:
        port: 3000

ingress:
  app:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare
      external-dns.alpha.kubernetes.io/internal-hostname: bambu.sievert.fun
    hosts:
    - host: bambu.sievert.fun
      paths:
      - path: /
        pathType: Prefix
        service:
          identifier: app
          port: http
    tls:
    - secretName: bambu-tls
      hosts:
      - bambu.sievert.fun

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: khal-drogo-nfs
    size: 1Gi
    globalMounts:
    - path: /config
